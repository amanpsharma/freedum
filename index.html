<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Freedium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      iframe {
        border: none;
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white h-screen flex flex-col overflow-hidden">
    <!-- Very simple top bar -->
    <div
      class="flex items-center gap-3 bg-zinc-900 p-4 border-b border-white/10"
    >
      <!-- Simple textbox -->
      <input
        id="urlInput"
        type="text"
        placeholder="Paste Medium link here..."
        class="flex-1 bg-transparent text-white placeholder:text-zinc-400 px-4 py-3 text-base outline-none border border-white/30 focus:border-cyan-400 rounded-2xl"
        autofocus
      />

      <button
        onclick="loadArticle()"
        class="w-11 h-11 bg-cyan-400 hover:bg-cyan-300 active:bg-cyan-500 transition-colors rounded-2xl flex items-center justify-center text-black text-3xl font-light"
      >
        →
      </button>
    </div>

    <!-- Full screen web view -->
    <div id="webContainer" class="flex-1 hidden bg-white">
      <iframe id="articleFrame" class="w-full h-full"></iframe>
    </div>

    <script>
      function loadArticle() {
        const input = document.getElementById("urlInput").value.trim();
        if (!input) return;

        let url = input;
        if (!url.startsWith("http")) {
          url = "https://" + url;
        }

        const freediumUrl = `https://freedium-mirror.cfd/${url}`;

        const container = document.getElementById("webContainer");
        const iframe = document.getElementById("articleFrame");

        iframe.src = freediumUrl;
        container.classList.remove("hidden");
      }

      // Press Enter
      document
        .getElementById("urlInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            loadArticle();
          }
        });
    </script>
  </body>
</html>
